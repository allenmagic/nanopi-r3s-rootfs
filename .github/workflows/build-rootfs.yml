name: Build Router Rootfs

env:
  ALL_DISTROS: '["void","devuan","debian","alpine"]'  # 与 workflow_dispatch.inputs.distro.options 保持同步
  ALL_INFRAS: '["sing-box","landscape"]'     # 路由系统组件

on:
  workflow_dispatch:
    inputs:
      distro:
        description: "要构建的发行版"
        type: choice
        required: true
        default: all
        options: [all, void, devuan, debian, alpine]
      infra:
        description: "路由系统组件"
        type: choice
        required: true
        default: sing-box
        options: [all, sing-box, landscape]
      mirror:
        description: "镜像源"
        type: choice
        required: true
        default: default
        options: [default, tuna]

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04-arm
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          # distro 列表
          if [ "${{ inputs.distro }}" = "all" ]; then
            DISTROS='${{ env.ALL_DISTROS }}'
          else
            DISTROS='["${{ inputs.distro }}"]'
          fi
          # infra 列表
          if [ "${{ inputs.infra }}" = "all" ]; then
            INFRAS='${{ env.ALL_INFRAS }}'
          else
            INFRAS='["${{ inputs.infra }}"]'
          fi
          echo "matrix={\"distro\":${DISTROS},\"infra\":${INFRAS}}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    name: build-${{ matrix.distro }}-${{ matrix.infra }}
    env:
      DISTRO: ${{ matrix.distro }}
      INFRA: ${{ matrix.infra }}
      PACK: "1"
      REPO: ${{ inputs.mirror }}
      ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      HEADSCALE_AUTH_KEY: ${{ secrets.HEADSCALE_AUTH_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xz-utils zstd file binutils \
            curl ca-certificates wget \
            mmdebstrap debootstrap debian-archive-keyring \
            gpgv

      - name: Build ${{ matrix.distro }} rootfs (${{ matrix.infra }})
        run: |
          set -euo pipefail
          chmod +x "distros/${DISTRO}/build.sh" || true
          sudo -E bash -x "distros/${DISTRO}/build.sh"

      - name: Locate artifact
        id: artifact
        run: |
          set -euo pipefail
          f="$(ls -1 build/${DISTRO}/${DISTRO}-rootfs-minimal.tar.xz 2>/dev/null \
               || ls -1 build/${DISTRO}/*-rootfs-minimal.tar.* 2>/dev/null \
               || ls -1 build/${DISTRO}/*.tar.* 2>/dev/null | head -n1)"
          if [ -z "${f:-}" ] || [ ! -e "$f" ]; then
            echo "未找到 ${DISTRO} 产物" >&2
            ls -lR build/${DISTRO} || true
            exit 1
          fi
          out="${DISTRO}-${INFRA}-aarch64-rootfs.tar.${f##*.}"
          cp "$f" "$out"
          sha256sum "$out" > "${out}.sha256"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          echo "sha=${out}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.distro }}-${{ matrix.infra }}-aarch64-rootfs
          path: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.sha }}
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: ${{ always() && contains(needs.build.result, 'success') }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: echo "tag=nanopi-r3s-rootfs-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Create / Update Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/*.tar.xz
            dist/*.sha256
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
