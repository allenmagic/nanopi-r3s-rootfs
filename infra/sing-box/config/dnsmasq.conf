# ============================================================
# dnsmasq.conf —— 出厂默认配置（仅 DHCP，DNS 由 sing-box 提供）
# 被 render.sh 生成的站点配置覆盖
# ============================================================

# 关闭 DNS 功能（DNS 由 sing-box 接管）
port=0

# ============================================================
# 1. 监听配置
# ============================================================
# 只监听内网接口
interface=eth1

# 绑定动态接口，适应虚拟化环境（PVE）接口启动时序
bind-dynamic

# ============================================================
# 2. 引入模块化配置目录
# ============================================================
conf-dir=/etc/dnsmasq.d/,*.conf
