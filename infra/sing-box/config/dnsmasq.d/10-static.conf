# ============================================================
# 固定 IP 分配列表
# 格式：dhcp-host=MAC地址,IP地址,设备名,租期(可选)
# ============================================================

# 案例：Windows Server 代理服务器
# dhcp-host=BC:24:11:A9:6A:8D,192.168.10.10,win2016-proxy,infinite

# 案例：NAS 服务器
# dhcp-host=11:22:33:44:55:66,192.168.10.10,my-nas,infinite

# 案例：无线 AP
# dhcp-host=22:33:44:55:66:77,192.168.10.2,tplink-ap,infinite
