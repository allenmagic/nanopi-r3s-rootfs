# ========== 内存与文件系统管理 ==========
vm.swappiness = 10
vm.vfs_cache_pressure = 50

# ========== 连接跟踪优化 (利用闲置内存扩大连接池) ==========
# 注意：需 nf_conntrack 模块加载后才生效，用 - 前缀静默跳过
-net.netfilter.nf_conntrack_max = 262144
-net.netfilter.nf_conntrack_tcp_timeout_established = 3600
-net.netfilter.nf_conntrack_tcp_timeout_syn_recv = 15
-net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30
-net.netfilter.nf_conntrack_udp_timeout = 60

# ========== 缓冲区与网络栈内存上限 (适配 2G 内存，防止 OOM) ==========
# rmem/wmem 最大 16MB，适合 BBR 和千兆/2.5G 高速吞吐
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 262144
net.core.wmem_default = 262144
net.ipv4.tcp_rmem = 4096 131072 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.tcp_mem = 65536 131072 262144
net.ipv4.udp_mem = 65536 131072 262144
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# ========== 队列与并发 ==========
net.core.somaxconn = 4096
net.core.netdev_max_backlog = 8192
net.core.netdev_budget = 600
net.core.netdev_budget_usecs = 8000

# ========== TCP优化 ==========
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_max_syn_backlog = 8192
net.ipv4.ip_local_port_range = 10000 65535

# ========== BBR拥塞控制 (需内核 CONFIG_TCP_CONG_BBR + CONFIG_NET_SCH_FQ) ==========
-net.core.default_qdisc = fq
-net.ipv4.tcp_congestion_control = bbr

# ========== 多队列优化 (配合多核 CPU，需 CONFIG_RPS) ==========
-net.ipv4.rps_sock_flow_entries = 32768
